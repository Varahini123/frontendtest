<!DOCTYPE html>
<html>

<head>

    <title>Advanced Todo App</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .box{
            width: 420px;
            background-color: rgb(246, 237, 237);
            margin: auto;
            margin-top: 50px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgb(87, 83, 83);
        }

        h2{
            color: rgb(79, 79, 174);
        }

        input, select, textarea{
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid gray;
            font-size: 15px;
        }

        button{
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        .addbtn{
            background-color: green;
            color: white;
        }

        .deletebtn{
            background-color: rgb(142, 53, 53);
            color: white;
            margin-top: 5px;
        }

        .task{
            background-color: #f1f8ff;
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px lightgray;
            text-align: left;
        }

        .task h3{
            margin: 5px;
            color: rgb(37, 37, 170);
        }

        .task p{
            margin: 5px;
            color: #444;
        }

        .count{
            margin-top: 15px;
            font-weight: bold;
            color: darkgreen;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>📝 Advanced Todo List App</h2>

        <!-- TASK NAME -->
        <input type="text" id="task" placeholder="Enter Task">

        <!-- DESCRIPTION -->
        <textarea id="desc" placeholder="Enter Description"></textarea>

        <!-- TIME -->
        <input type="time" id="time">

        <!-- CATEGORY -->
        <select id="category">

            <option value="Study">Study</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>

        </select>

        <button class="addbtn" onclick="addTask()">Add Task</button>

        <br><br>

        <select onchange="filterTasks()" id="filter">

            <option value="All">Show All</option>
            <option value="Study">Study</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>

        </select>

        <div class="count" id="count"></div>

        <div id="result"></div>

    </div>

    <script>

        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        showTasks(tasks);

        function addTask(){

            let taskname = document.getElementById("task").value;
            let desc = document.getElementById("desc").value;
            let time = document.getElementById("time").value;
            let category = document.getElementById("category").value;

            if(taskname === ""){
                alert("Please Enter Task");
                return;
            }

            let obj = {
                task: taskname,
                desc: desc,
                time: time,
                type: category
            };

            tasks.push(obj);

            localStorage.setItem("tasks", JSON.stringify(tasks));

            showTasks(tasks);

            // clear fields
            document.getElementById("task").value = "";
            document.getElementById("desc").value = "";
            document.getElementById("time").value = "";
        }

        function showTasks(data){

            let output = "";

            for(let i = 0; i < data.length; i++){

                output += `
                    <div class="task">
                        <h3>${data[i].task}</h3>
                        <p><b>Description:</b> ${data[i].desc || "No description"}</p>
                        <p><b>Time:</b> ${data[i].time || "Not set"}</p>
                        <p><b>Category:</b> ${data[i].type}</p>

                        <button class="deletebtn" onclick="deleteTask(${i})">
                            Delete
                        </button>
                    </div>
                `;
            }

            document.getElementById("result").innerHTML = output;
            document.getElementById("count").innerHTML =
                "Total Tasks : " + data.length;
        }

        function deleteTask(index){

            tasks.splice(index, 1);

            localStorage.setItem("tasks", JSON.stringify(tasks));

            showTasks(tasks);
        }

        function filterTasks(){

            let value = document.getElementById("filter").value;

            if(value === "All"){
                showTasks(tasks);
            }
            else{
                let filtered = tasks.filter(item => item.type === value);
                showTasks(filtered);
            }
        }

    </script>

</body>

</html>
